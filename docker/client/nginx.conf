server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log warn;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  client_max_body_size 25m;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    application/geo+json
    application/json
    application/javascript
    application/wasm
    font/woff2
    image/svg+xml
    text/css
    text/javascript
    text/plain;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location ~* \.(?:js|mjs|css|wasm|woff2?|ttf|otf)$ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location ~* \.(?:glb|gltf|bin|ktx2|basis|png|jpg|jpeg|webp|gif|ico|svg|json|geojson)$ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=2592000";
  }

  location /3d-bundles/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=2592000";
  }

  location /offline-map/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=2592000";
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
